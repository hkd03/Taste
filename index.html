<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taste in Motion</title>
  <style>
    body { margin: 0; background: #0e0e0f; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React globals FIRST — must load before the JSX -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel standalone to compile JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Your app — type="text/babel" tells Babel to compile it -->
  <script type="text/babel" src="taste-app.jsx" data-presets="react" data-type="module"></script>

  <!-- Mount — runs after taste-app.jsx is compiled -->
  <script type="text/babel" data-presets="react">
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
